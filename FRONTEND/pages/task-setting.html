<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noted! - Task Setting</title>
    <link rel="stylesheet" href="../css/auth.css">
    <style>
        /* Mengizinkan scroll pada halaman ini */
        body { 
            overflow-y: auto; 
        }
        
        .auth-container { 
            height: auto; 
            min-height: 100vh; 
            padding: 4rem 1rem; 
            align-items: flex-start; 
        }

        .auth-card { 
            max-width: 900px; 
            text-align: left; 
            padding: 2rem; 
            margin: 0 auto; 
        }
        
        .input-wide { 
            width: 100%; 
            background: var(--bg-cream); 
            color: var(--text-dark); 
            border: none; 
            padding: 1rem; 
            border-radius: 6px; 
            font-family: var(--font-heading); 
            font-size: 1.2rem; 
            margin-bottom: 1rem; 
        }
        
        .textarea-wide { 
            width: 100%; 
            background: var(--bg-cream); 
            color: var(--text-dark); 
            border: none; 
            padding: 2rem; 
            border-radius: 6px; 
            font-family: var(--font-heading); 
            font-size: 1.2rem; 
            min-height: 200px; 
            margin-bottom: 1.5rem; 
            resize: none; 
            text-align: center; 
        }

        .input-wide::placeholder, .textarea-wide::placeholder {
            color: var(--text-dark);
            opacity: 0.5;
        }

        .grid-2col { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 2rem; 
            margin-bottom: 2rem;
        }
        
        .section-title { 
            font-family: var(--font-heading); 
            font-size: 1.2rem; 
            margin-bottom: 0.5rem; 
            margin-top: 1rem; 
        }
        
        .btn-gray { 
            background: var(--card-gray); 
            color: var(--text-dark); 
            border: none; 
            padding: 0.5rem 1rem; 
            border-radius: 4px; 
            cursor: pointer; 
            display: inline-block; 
            margin-bottom: 0.5rem; 
            font-family: var(--font-heading); 
            transition: 0.2s;
        }
        
        .btn-gray:hover { 
            background: #d0d0d0; 
        }
        
        .member-list { 
            background: var(--card-gray); 
            color: var(--text-dark); 
            padding: 1rem; 
            border-radius: 6px; 
            min-height: 100px; 
            font-family: var(--font-heading); 
            max-width: 350px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 350px;
            margin-top: 0.5rem;
        }

        .btn-action { 
            background: var(--bg-cream); 
            color: var(--text-dark); 
            border: none; 
            padding: 0.6rem 2.5rem; 
            font-size: 1.2rem; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: var(--font-heading); 
            transition: transform 0.2s;
        }
        
        .btn-action:hover { 
            transform: scale(1.05); 
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="corner-decoration"></div>
    <div class="auth-container">
        <div class="auth-card">
            <input type="text" class="input-wide" placeholder="Task Name">
            <textarea class="textarea-wide" placeholder="Task Description //(Max 1000 Characters)"></textarea>
            
            <div class="grid-2col">
                <div>
                    <p class="section-title" style="margin-top: 0;">Apply Member:</p>
                    <button class="btn-gray">Add Member (User id)</button>
                    <div class="member-list">
                        
                    </div>

                    <p class="section-title">Add Attachment:</p>
                    <button class="btn-gray">Add Attachment</button>
                    <div class="file-list">
                        
                    </div>
                </div>

                <div>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <p class="section-title" style="margin: 0;">Add Deadline:</p>
                        <button class="btn-gray" style="margin:0; background: var(--bg-cream);">Calendar</button>
                    </div>
                    <button class="btn-gray" style="margin-top: 1rem;">Add Deadline (Date)</button>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-action" onclick="window.location.href='list-dashboard.html'">Cancel</button>
                <button class="btn-action" onclick="window.location.href='list-dashboard.html'">Add</button>
            </div>
        </div>
    </div>
</body>
</html>
