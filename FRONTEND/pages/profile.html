<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noted! - Profile</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .profile-header { display: flex; gap: 2rem; align-items: center; margin-bottom: 2rem; }
        .profile-pic { width: 150px; height: 150px; border-radius: 50%; background-color: var(--card-gray); display: flex; justify-content: center; align-items: center; font-size: 2rem; color: var(--text-dark); font-family: var(--font-heading); }
        .username-box { background-color: var(--sidebar-red); color: white; flex-grow: 1; padding: 2rem; border-radius: 8px; font-size: 2.5rem; font-family: var(--font-heading); }
        .info-box { background-color: var(--bg-cream); color: var(--text-dark); padding: 1rem 2rem; border-radius: 8px; margin-bottom: 1rem; font-family: var(--font-heading); font-size: 1.2rem; }
    </style>
</head>
<script src="../js/api.js"></script>
<body>
    <aside class="sidebar">
        <h1 class="logo">Noted!</h1>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-btn">Main Dashboard</a>
            <a href="profile.html" class="nav-btn active">Profile</a>
            <a href="notification.html" class="nav-btn">Notification</a>
        </nav>
        <div class="sidebar-footer"><a href="login.html" class="nav-btn">Log Out</a></div>
    </aside>

    <main class="main-content">
        <h2 class="page-title">Profile.</h2>
        <button class="back-btn">Back</button>

        <div class="profile-header">
            <div class="profile-pic">Pic</div>
            <div class="username-box">Username</div>
        </div>

        <div class="info-box">Email : Email</div>
        <div class="info-box">Password : xxxx</div>
        <div class="info-box" style="display: flex; gap: 1rem; align-items: center;">
            Account Created At : <span style="background: #ccc; color: var(--text-dark); padding: 0.2rem 1rem; border-radius: 4px;">Date</span>
        </div>
    </main>
</body>
</html>
