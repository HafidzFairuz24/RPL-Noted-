<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noted! - List Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .list-header-banner { background-color: var(--sidebar-red); color: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; font-family: var(--font-heading); position: relative; }
        .list-header-banner h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .btn-edit-list-header {
            position: absolute; top: 1rem; right: 1rem;
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4);
            padding: 0.4rem 1.2rem; border-radius: 6px; cursor: pointer;
            font-family: var(--font-heading); font-size: 0.9rem; backdrop-filter: blur(4px);
        }
        .btn-edit-list-header:hover { background: rgba(255,255,255,0.35); }
        .task-bar { background-color: var(--card-gray); padding: 1.2rem 2rem; border-radius: 8px; margin-bottom: 1rem; font-family: var(--font-heading); font-size: 1.8rem; color: var(--text-dark); display: flex; align-items: center; text-decoration: none; transition: transform 0.2s; }
        .task-bar:hover { transform: scale(1.01); background-color: #d0d0d0; }
        .task-bar-name { flex: 1; }
        .task-bar.done .task-bar-name { text-decoration: line-through; opacity: 0.5; }
        .btn-edit-task-item {
            background: var(--sidebar-red); color: white; border: none;
            padding: 0.3rem 0.9rem; border-radius: 5px; cursor: pointer;
            font-family: var(--font-heading); font-size: 0.8rem;
            margin-left: 1rem; flex-shrink: 0; transition: opacity 0.2s;
        }
        .btn-edit-task-item:hover { opacity: 0.8; }
        .add-task-btn { background-color: var(--sidebar-red); width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; border-radius: 8px; margin: 2rem auto; cursor: pointer; border: none; transition: transform 0.2s;}
        .add-task-btn:hover { transform: scale(1.1); }

        .top-action-bar { 
            display: flex; 
            justify-content: flex-end; 
            margin-bottom: 1rem; 
        }

        .btn-back-cream { 
            background-color: var(--bg-cream); 
            color: var(--text-dark); 
            border: none; 
            padding: 0.5rem 2rem; 
            font-size: 1.2rem; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: var(--font-heading); 
            transition: transform 0.2s; 
        }
        .btn-back-cream:hover { transform: scale(1.05); }
        #loading-msg { font-family: var(--font-heading); color: var(--text-dark); opacity: 0.6; text-align: center; padding: 2rem; }
        #error-list { color: #c0392b; font-family: var(--font-heading); padding: 1rem; display: none; }

        .task-bar.done { text-decoration: line-through; opacity: 0.5; }

        @media (max-width: 768px) {
            .list-header-banner { padding: 1.5rem; text-align: center; }
            .btn-edit-list-header { position: relative; top: 0; right: 0; width: 100%; margin-top: 1rem; display: block; }
            .task-bar { padding: 1rem; font-size: 1.2rem; flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .btn-edit-task-item { margin-left: 0; width: 100%; padding: 0.5rem; }
            .btn-back-cream { width: 100%; padding: 0.8rem; }
        }
    </style>
</head>
<script src="../js/api.js"></script>
<body>
    <aside class="sidebar">
        <h1 class="logo">Noted!</h1>
        <nav class="nav-menu">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img id="sidebar-avatar" alt="Avatar" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); display: none; margin: 0 auto 0.5rem auto;">
            </div>
            <a href="dashboard.html" class="nav-btn active">Main Dashboard</a>
            <a href="profile.html" class="nav-btn">Profile</a>
            <a href="notification.html" class="nav-btn" id="nav-notification">Notification <span id="notif-badge" style="display:none; width:10px; height:10px; background:red; border-radius:50%; margin-left:5px;"></span></a>
        </nav>
        <div class="sidebar-footer"><a href="#" class="nav-btn" onclick="Auth.logout()">Log Out</a></div>
    </aside>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
        <div class="top-action-bar">
            <button class="btn-back-cream" id="back-btn">Back</button>
        </div>

        <div class="list-header-banner">
            <button class="btn-edit-list-header" id="btn-edit-list">✏️ Edit List</button>
            <h2 id="list-name">List</h2>
            <p id="list-desc"></p>
        </div>

        <p id="error-list"></p>
        <p id="loading-msg">Memuat tasks...</p>

        <div id="task-container"></div>

        <button class="add-task-btn" id="add-task-btn">+</button>
    </main>

    <script>
        requireAuth();

        const params      = new URLSearchParams(window.location.search);
        const workspaceId = params.get('workspaceId');
        const listId      = params.get('listId');

        const currentUser = Auth.getUser();
        if (currentUser) {
            const avatarEl = document.getElementById('sidebar-avatar');
            const finalAvatar = currentUser.profile_picture || localStorage.getItem('noted_avatar');
            
            if (finalAvatar) {
                avatarEl.src = finalAvatar;
                avatarEl.style.display = 'block';
                if (currentUser.profile_picture) localStorage.setItem('noted_avatar', currentUser.profile_picture);
            } else {
                avatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.username || 'User')}&background=random`;
                avatarEl.style.display = 'block';
            }
        }

        // Back ke workspace dashboard
        document.getElementById('back-btn').onclick = function() {
            window.location.href = `workspace-dashboard.html?workspaceId=${workspaceId}`;
        };

        // Edit list → list-setting dalam mode edit
        document.getElementById('btn-edit-list').onclick = function() {
            window.location.href = `list-setting.html?workspaceId=${workspaceId}&listId=${listId}&mode=edit`;
        };

        // Tambah task
        document.getElementById('add-task-btn').onclick = function() {
            window.location.href = `task-setting.html?workspaceId=${workspaceId}&listId=${listId}`;
        };

        async function loadList() {
            if (!workspaceId || !listId) {
                // Redirect ke dashboard jika params tidak ada
                window.location.href = 'dashboard.html';
                return;
            }

            try {
                // Cek role user saat ini via Workspace
                const currentUser = Auth.getUser();
                let myRole = 'member';
                try {
                    const wsRes = await WorkspaceAPI.getOne(workspaceId);
                    const ws = wsRes.workspace || wsRes.data || wsRes;
                    if (currentUser && ws.members) {
                        const me = ws.members.find(m => m.id === currentUser.id);
                        if (me) myRole = me.role;
                    }
                } catch (e) { console.error('Gagal cek role', e); }

                if (myRole === 'member') {
                    document.getElementById('add-task-btn').style.display = 'none';
                    document.getElementById('btn-edit-list').style.display  = 'none';
                }

                // Load detail list
                const listRes  = await ListAPI.getOne(workspaceId, listId);
                const list     = listRes.list || listRes.data || listRes;
                document.getElementById('list-name').textContent = list.name  || list.title || 'List';
                document.getElementById('list-desc').textContent = list.description || '';

                // Load tasks
                const taskRes  = await TaskAPI.getAll(listId);
                const tasks    = Array.isArray(taskRes) ? taskRes : (taskRes.tasks || taskRes.data || []);
                const container = document.getElementById('task-container');
                document.getElementById('loading-msg').style.display = 'none';

                if (tasks.length === 0) {
                    document.getElementById('loading-msg').textContent = 'Belum ada task. Buat task pertama!';
                    document.getElementById('loading-msg').style.display = 'block';
                    return;
                }

                tasks.forEach(task => {
                    const a = document.createElement('a');
                    a.className = 'task-bar' + (task.status === 'done' ? ' done' : '');
                    a.href      = `task-page.html?workspaceId=${workspaceId}&listId=${listId}&taskId=${task.id}`;

                    const nameSpan = document.createElement('span');
                    nameSpan.className   = 'task-bar-name';
                    nameSpan.textContent = task.title || 'Untitled Task';

                    a.appendChild(nameSpan);

                    if (myRole !== 'member') {
                        const editBtn = document.createElement('button');
                        editBtn.className   = 'btn-edit-task-item';
                        editBtn.textContent = '✏️ Edit';
                        editBtn.onclick     = function(e) {
                            e.preventDefault(); e.stopPropagation();
                            window.location.href = `task-setting.html?workspaceId=${workspaceId}&listId=${listId}&taskId=${task.id}&mode=edit`;
                        };
                        a.appendChild(editBtn);
                    }

                    container.appendChild(a);
                });

            } catch (err) {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('error-list').textContent = 'Gagal memuat data: ' + (err.message || 'Unknown error');
                document.getElementById('error-list').style.display = 'block';
            }
        }

        loadList();
    </script>
</body>
</html>
