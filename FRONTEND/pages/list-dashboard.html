<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noted! - List Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .list-header-banner { background-color: var(--sidebar-red); color: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; font-family: var(--font-heading); }
        .list-header-banner h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .task-bar { background-color: var(--card-gray); padding: 1.5rem 2rem; border-radius: 8px; margin-bottom: 1rem; font-family: var(--font-heading); font-size: 2rem; color: var(--text-dark); display: block; text-decoration: none; transition: transform 0.2s; }
        .task-bar:hover { transform: scale(1.01); background-color: #d0d0d0; }
        .add-task-btn { background-color: var(--sidebar-red); width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; border-radius: 8px; margin: 2rem auto; cursor: pointer; border: none; transition: transform 0.2s;}
        .add-task-btn:hover { transform: scale(1.1); }

        /* Tambahan Style untuk tombol Back agar sesuai desain */
        .top-action-bar { 
            display: flex; 
            justify-content: flex-end; 
            margin-bottom: 1rem; 
        }

        .btn-back-cream { 
            background-color: var(--bg-cream); 
            color: var(--text-dark); 
            border: none; 
            padding: 0.5rem 2rem; 
            font-size: 1.2rem; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: var(--font-heading); 
            transition: transform 0.2s; 
        }
        .btn-back-cream:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h1 class="logo">Noted!</h1>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-btn active">Main Dashboard</a>
            <a href="profile.html" class="nav-btn">Profile</a>
            <a href="notification.html" class="nav-btn">Notification</a>
        </nav>
        <div class="sidebar-footer"><a href="login.html" class="nav-btn">Log Out</a></div>
    </aside>

    <main class="main-content">
        <div class="top-action-bar">
            <button class="btn-back-cream" onclick="window.location.href='workspace-dashboard.html'">Back</button>
        </div>

        <div class="list-header-banner">
            <h2>List 1</h2>
            <p>Description subheading</p>
        </div>

        <a href="task-page.html" class="task-bar">Task 1</a>
        <a href="task-page.html" class="task-bar">Task 2</a>
        <a href="task-page.html" class="task-bar">Task 3</a>
        <a href="task-page.html" class="task-bar">Task 4</a>

        <button class="add-task-btn" onclick="window.location.href='task-setting.html'">+</button>
    </main>
</body>
</html>
