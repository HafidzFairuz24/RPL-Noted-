<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noted! - Main Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
   <style>
    .header-banner { 
        background-color: var(--primary-red); 
        color: white; 
        padding: 1.5rem 2rem; 
        border-radius: 8px; 
        font-family: var(--font-heading); 
        font-size: 1.5rem; 
        margin-bottom: 3rem; 
    }
    
    .workspace-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 2rem; 
    }
    
    .workspace-card { 
        background-color: var(--card-gray); 
        height: 180px; 
        border-radius: 8px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-family: var(--font-heading); 
        font-size: 1.5rem; 
        color: var(--text-dark);
        text-decoration: none; 
        transition: transform 0.3s, background-color 0.3s; 
        cursor: pointer;
    }
    
    .workspace-card:hover { 
        transform: translateY(-5px); 
        background-color: #d8d8d8; 
        color: var(--text-dark); 
    }
    
    .add-workspace-btn { 
        background-color: var(--primary-red); 
        height: 80px; 
        width: 80px; 
        margin: 50px auto 0 auto; 
        border-radius: 8px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
        transition: transform 0.3s; 
        color: white; 
        font-size: 3rem; 
        font-weight: 200; 
        text-decoration: none; 
    }
    
    .add-workspace-btn:hover { 
        transform: scale(1.1); 
    }

    #loading-msg { 
        font-family: var(--font-heading); 
        color: var(--text-dark); 
        opacity: 0.6; 
        text-align: center; 
        padding: 2rem; 
    }
    #error-dashboard { 
        color: #c0392b; 
        font-family: var(--font-heading); 
        padding: 1rem; 
        display: none; 
    }
</style>
</head>
<script src="../js/api.js"></script>
<body>
    <aside class="sidebar">
        <h1 class="logo">Noted!</h1>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-btn active">Main Dashboard</a>
            <a href="profile.html" class="nav-btn">Profile</a>
            <a href="notification.html" class="nav-btn">Notification</a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-btn" style="display: block;" onclick="Auth.logout()">Log Out</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="header-banner">
            <h2 id="welcome-text">Welcome, ...</h2>
        </div>

        <p id="error-dashboard"></p>
        <p id="loading-msg">Memuat workspace...</p>

        <div class="workspace-grid" id="workspace-grid"></div>

        <a href="workspace-setting.html" class="add-workspace-btn">+</a>
    </main>

    <script>
        requireAuth();

        // Tampilkan nama user
        const user = Auth.getUser();
        if (user) {
            document.getElementById('welcome-text').textContent = `Welcome, ${user.username || user.name || 'User'}.`;
        }

        async function loadWorkspaces() {
            const grid       = document.getElementById('workspace-grid');
            const loadingMsg = document.getElementById('loading-msg');
            const errEl      = document.getElementById('error-dashboard');

            try {
                const res = await WorkspaceAPI.getAll();
                // Backend bisa mengembalikan array langsung atau { workspaces: [...] }
                const workspaces = Array.isArray(res) ? res : (res.workspaces || res.data || []);
                loadingMsg.style.display = 'none';

                if (workspaces.length === 0) {
                    loadingMsg.textContent = 'Belum ada workspace. Buat yang pertama!';
                    loadingMsg.style.display = 'block';
                    return;
                }

                workspaces.forEach(ws => {
                    const card = document.createElement('a');
                    card.className = 'workspace-card';
                    card.textContent = ws.name || ws.title || 'Untitled';
                    // Teruskan workspaceId via URL parameter
                    card.href = `workspace-dashboard.html?workspaceId=${ws._id || ws.id}`;
                    grid.appendChild(card);
                });
            } catch (err) {
                loadingMsg.style.display = 'none';
                errEl.textContent = 'Gagal memuat workspace: ' + (err.message || 'Unknown error');
                errEl.style.display = 'block';
            }
        }

        loadWorkspaces();
    </script>
</body>
</html>
