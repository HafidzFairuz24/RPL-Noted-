<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noted! - Main Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
   <style>
    .header-banner { 
        background-color: var(--primary-red); 
        color: white; 
        padding: 1.5rem 2rem; 
        border-radius: 8px; 
        font-family: var(--font-heading); 
        font-size: 1.5rem; 
        margin-bottom: 3rem; 
    }
    
    .workspace-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 2rem; 
    }
    
    .workspace-card { 
        background-color: var(--card-gray); 
        height: 180px; 
        border-radius: 8px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-family: var(--font-heading); 
        font-size: 1.5rem; 
        color: var(--text-dark);
        text-decoration: none; 
        transition: transform 0.3s, background-color 0.3s; 
        cursor: pointer;
    }
    
    .workspace-card:hover { 
        transform: translateY(-5px); 
        background-color: #d8d8d8; 
        color: var(--text-dark); 
    }
    
    .add-workspace-btn { 
        background-color: var(--primary-red); 
        height: 80px; 
        width: 80px; 
        margin: 50px auto 0 auto; 
        border-radius: 8px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
        transition: transform 0.3s; 
        color: white; 
        font-size: 3rem; 
        font-weight: 200; 
        text-decoration: none; 
    }
    
    .add-workspace-btn:hover { 
        transform: scale(1.1); 
    }

    #loading-msg { 
        font-family: var(--font-heading); 
        color: var(--text-dark); 
        opacity: 0.6; 
        text-align: center; 
        padding: 2rem; 
    }
    #error-dashboard { 
        color: #c0392b; 
        font-family: var(--font-heading); 
        padding: 1rem; 
        display: none; 
    }

    .section-title {
        font-family: var(--font-heading);
        font-size: 1.8rem;
        color: var(--text-dark);
        margin-top: 2rem;
        margin-bottom: 1rem;
        border-bottom: 2px solid var(--primary-red);
        display: inline-block;
        padding-bottom: 0.3rem;
    }

    .task-bar { 
        background-color: var(--card-gray); 
        padding: 1.2rem 2rem; 
        border-radius: 8px; 
        margin-bottom: 1rem; 
        font-family: var(--font-heading); 
        color: var(--text-dark); 
        display: flex; 
        align-items: center; 
        text-decoration: none; 
        transition: transform 0.2s; 
    }
    .task-bar:hover { 
        transform: scale(1.01); 
        background-color: #d0d0d0; 
    }
    .task-bar-content { 
        flex: 1; 
        display: flex;
        flex-direction: column;
    }
    .task-bar-name { 
        font-size: 1.5rem;
    }
    .task-bar-meta {
        font-size: 0.9rem;
        color: #666;
        margin-top: 0.3rem;
    }
    .task-bar.done .task-bar-name { text-decoration: line-through; opacity: 0.5; }
    .task-bar.done .task-bar-meta { opacity: 0.5; }
    .task-status-badge {
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
        border-radius: 4px;
        color: white;
        margin-left: 1rem;
        text-transform: uppercase;
        font-weight: bold;
    }
    .status-todo { background-color: #f39c12; }
    .status-done { background-color: #27ae60; }

    @media (max-width: 768px) {
        .add-workspace-btn {
            width: 60px;
            height: 60px;
            font-size: 2rem;
            margin: 30px auto 0 auto;
        }
        .header-banner {
            padding: 1.5rem;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
    }
</style>
</head>
<script src="../js/api.js"></script>
<body>
    <aside class="sidebar">
        <h1 class="logo">Noted!</h1>
        <nav class="nav-menu">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img id="sidebar-avatar" alt="Avatar" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); display: none; margin: 0 auto 0.5rem auto;">
            </div>
            <a href="dashboard.html" class="nav-btn active">Main Dashboard</a>
            <a href="profile.html" class="nav-btn">Profile</a>
            <a href="notification.html" class="nav-btn" id="nav-notification">Notification <span id="notif-badge" style="display:none; width:10px; height:10px; background:red; border-radius:50%; margin-left:5px;"></span></a>
            <a href="report-bug.html" class="nav-btn">Report a Bug</a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-btn" style="display: block;" onclick="Auth.logout()">Log Out</a>
        </div>
    </aside>

    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
        <div class="header-banner">
            <h2 id="welcome-text">Welcome, ...</h2>
        </div>

        <p id="error-dashboard"></p>

        <h3 class="section-title">My Tasks - To Do</h3>
        <p id="loading-tasks-msg" style="font-family: var(--font-heading); color: var(--text-dark); opacity: 0.6;">Memuat tasks...</p>
        <div id="todo-tasks-container"></div>

        <h3 class="section-title">My Tasks - Done</h3>
        <div id="done-tasks-container"></div>

        <h3 class="section-title" style="display: block; margin-top: 3rem;">Workspaces</h3>
        <p id="loading-msg">Memuat workspace...</p>

        <div class="workspace-grid" id="workspace-grid"></div>

        <a href="workspace-setting.html" class="add-workspace-btn">+</a>
    </main>

    <script>
        requireAuth();

        // Tampilkan nama user dan avatar
        const user = Auth.getUser();
        if (user) {
            document.getElementById('welcome-text').textContent = `Welcome, ${user.username || user.name || 'User'}.`;
            
            const avatarEl = document.getElementById('sidebar-avatar');
            // Gunakan profile_picture dari DB, fallback ke localStorage, fallback ke ui-avatars
            const finalAvatar = user.profile_picture || localStorage.getItem('noted_avatar');
            
            if (finalAvatar) {
                avatarEl.src = finalAvatar;
                avatarEl.style.display = 'block';
                if (user.profile_picture) localStorage.setItem('noted_avatar', user.profile_picture);
            } else {
                avatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username || 'User')}&background=random`;
                avatarEl.style.display = 'block';
            }
        }

        async function loadWorkspaces() {
            const grid       = document.getElementById('workspace-grid');
            const loadingMsg = document.getElementById('loading-msg');
            const errEl      = document.getElementById('error-dashboard');

            try {
                const res = await WorkspaceAPI.getAll();
                const workspaces = Array.isArray(res) ? res : (res.workspaces || res.data || []);
                loadingMsg.style.display = 'none';

                if (workspaces.length === 0) {
                    loadingMsg.textContent = 'Belum ada workspace. Buat yang pertama!';
                    loadingMsg.style.display = 'block';
                    return;
                }

                workspaces.forEach(ws => {
                    const card = document.createElement('a');
                    card.className = 'workspace-card';
                    card.textContent = ws.name || 'Untitled';
                    
                    if (ws.background_image) {
                        card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(${ws.background_image})`;
                        card.style.backgroundSize = 'cover';
                        card.style.backgroundPosition = 'center';
                        card.style.color = 'white';
                        card.style.textShadow = '0 2px 4px rgba(0,0,0,0.8)';
                    }
                    
                    card.href = `workspace-dashboard.html?workspaceId=${ws.id}`;
                    grid.appendChild(card);
                });
            } catch (err) {
                loadingMsg.style.display = 'none';
                errEl.textContent = 'Gagal memuat workspace: ' + (err.message || 'Unknown error');
                errEl.style.display = 'block';
            }
        }

        async function loadMyTasks() {
            const todoContainer = document.getElementById('todo-tasks-container');
            const doneContainer = document.getElementById('done-tasks-container');
            const loadingMsg = document.getElementById('loading-tasks-msg');
            const errEl = document.getElementById('error-dashboard');

            try {
                const res = await TaskAPI.getMyTasks();
                const tasks = res.tasks || [];
                loadingMsg.style.display = 'none';

                if (tasks.length === 0) {
                    todoContainer.innerHTML = '<p style="opacity:0.6; font-family:var(--font-heading);">Tidak ada tugas saat ini.</p>';
                    doneContainer.innerHTML = '<p style="opacity:0.6; font-family:var(--font-heading);">Tidak ada tugas saat ini.</p>';
                    return;
                }

                let todoCount = 0;
                let doneCount = 0;

                tasks.forEach(task => {
                    const a = document.createElement('a');
                    a.className = 'task-bar' + (task.status === 'done' ? ' done' : '');
                    a.href = `task-page.html?workspaceId=${task.workspace_id}&listId=${task.list_id}&taskId=${task.id}`;

                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'task-bar-content';

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'task-bar-name';
                    nameSpan.textContent = task.title || 'Untitled Task';

                    const metaSpan = document.createElement('span');
                    metaSpan.className = 'task-bar-meta';
                    metaSpan.textContent = `List: ${task.list_name} | Workspace: ${task.workspace_name}`;

                    contentDiv.appendChild(nameSpan);
                    contentDiv.appendChild(metaSpan);
                    a.appendChild(contentDiv);

                    const badge = document.createElement('span');
                    badge.className = 'task-status-badge ' + (task.status === 'done' ? 'status-done' : 'status-todo');
                    badge.textContent = task.status === 'done' ? 'Done' : 'To Do';
                    a.appendChild(badge);

                    if (task.status === 'done') {
                        doneContainer.appendChild(a);
                        doneCount++;
                    } else {
                        todoContainer.appendChild(a);
                        todoCount++;
                    }
                });

                if (todoCount === 0) todoContainer.innerHTML = '<p style="opacity:0.6; font-family:var(--font-heading);">Semua tugas selesai!</p>';
                if (doneCount === 0) doneContainer.innerHTML = '<p style="opacity:0.6; font-family:var(--font-heading);">Belum ada tugas yang selesai.</p>';

            } catch (err) {
                loadingMsg.style.display = 'none';
                errEl.textContent = 'Gagal memuat tugas: ' + (err.message || 'Unknown error');
                errEl.style.display = 'block';
            }
        }

        loadMyTasks();
        loadWorkspaces();
    </script>
</body>
</html>
