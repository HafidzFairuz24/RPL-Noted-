<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noted! - Sign Up</title>
    <link rel="stylesheet" href="../css/auth.css">
    <style>
        .signup-wrapper { display: flex; width: 100%; max-width: 1000px; gap: 3rem; align-items: center; z-index: 2; margin: 0 auto; padding: 2rem; }
        .auth-card { flex: 1; }
        .image-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; position: relative; }
        .img-box { background-color: var(--sidebar-red); border-radius: 12px; overflow: hidden; height: 200px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .img-box:nth-child(1) { transform: translateY(-30px); }
        .img-box:nth-child(2) { grid-row: span 2; height: 300px; transform: translateY(30px); }
        .img-box:nth-child(3) { transform: translateY(-10px); }
    </style>
</head>
<body>
    <div class="corner-decoration"></div>
    <div class="auth-container">
        <div class="signup-wrapper">
            <div class="auth-card">
                <h2>Welcome!</h2>
                <div class="form-group-wrapper">
                    <form action="dashboard.html" method="GET">
                        <div class="input-group"><label>Username</label><input type="text" required></div>
                        <div class="input-group"><label>Email</label><input type="email" required></div>
                        <div class="input-group"><label>Password</label><input type="password" required></div>
                        <div class="input-group"><label>Confirm Password</label><input type="password" required></div>
                    </form>
                </div>
                <button type="button" class="auth-btn" onclick="window.location.href='dashboard.html'">Sign In</button><br>
                <a href="login.html" class="auth-link">Already have an account? Click here!</a>
            </div>

            <div class="image-grid">
                <div class="img-box"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="setup 1"></div>
                <div class="img-box"><img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d" alt="setup 2"></div>
                <div class="img-box"><img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c" alt="setup 3"></div>
            </div>
        </div>
    </div>
</body>
</html>
