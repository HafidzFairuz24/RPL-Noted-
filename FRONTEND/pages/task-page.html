<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noted! - Task Detail</title>
    <link rel="stylesheet" href="../css/auth.css">
    <style>
        body { overflow-y: auto; }
        .auth-container {
            flex-direction: column; justify-content: flex-start;
            padding-top: 5vh; height: auto; min-height: 100vh; padding-bottom: 4rem;
        }
        .auth-card {
            max-width: 900px; text-align: left; padding: 2rem;
            position: relative; margin: 2rem auto; width: 100%;
        }

        /* Task header */
        .task-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; font-family: var(--font-heading); gap: 1rem; flex-wrap: wrap;
        }
        .task-title-display {
            color: white; font-size: 2rem; margin: 0; word-break: break-word; flex: 1;
        }

        .task-action-row { display: flex; gap: 0.6rem; flex-shrink: 0; align-items: center; }

        .btn-back {
            background: var(--bg-cream); color: var(--text-dark); border: none;
            padding: 0.5rem 1.5rem; font-size: 1rem; border-radius: 4px;
            cursor: pointer; font-family: var(--font-heading); transition: transform 0.2s;
        }
        .btn-back:hover { transform: scale(1.05); }

        .btn-edit-task {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4);
            padding: 0.5rem 1.2rem; font-size: 0.95rem; border-radius: 4px;
            cursor: pointer; font-family: var(--font-heading); transition: background 0.2s;
            display: none; /* hidden by default, shown if manager/owner */
        }
        .btn-edit-task:hover { background: rgba(255,255,255,0.35); }

        .textarea-wide {
            width: 100%; background: var(--bg-cream); color: var(--text-dark);
            border: none; padding: 2rem; border-radius: 6px;
            font-family: var(--font-heading); font-size: 1.2rem; opacity: 0.9;
            min-height: 150px; margin-bottom: 1.5rem; resize: none; outline: none;
        }

        /* Task meta info */
        .task-meta {
            display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
            font-family: var(--font-heading); align-items: center;
        }
        .meta-item {
            background: rgba(255,255,255,0.15); padding: 0.4rem 1rem;
            border-radius: 20px; color: white; font-size: 0.95rem;
        }
        .meta-item.priority-high   { background: rgba(231,76,60,0.5); }
        .meta-item.priority-medium { background: rgba(230,126,34,0.4); }
        .meta-item.priority-low    { background: rgba(39,174,96,0.4); }
        .meta-item.status-done     { background: rgba(39,174,96,0.5); }
        .meta-item.status-progress { background: rgba(52,152,219,0.4); }

        .assignee-badge {
            background: var(--bg-cream); color: var(--text-dark);
            padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .assignee-badge::before { content: '👤'; }

        .deadline-section {
            display: flex; align-items: center; gap: 1rem;
            font-family: var(--font-heading); font-size: 1rem; color: white;
            margin-bottom: 1.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem 1rem; border-radius: 8px;
        }
        
        .attachment-section {
            margin-bottom: 2rem;
            display: none;
        }
        .attachment-img {
            max-width: 100%; max-height: 400px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2);
            object-fit: contain; background: rgba(0,0,0,0.3);
        }

        .btn-done {
            background: var(--bg-cream); color: var(--text-dark); border: none;
            padding: 0.6rem 2rem; font-size: 1rem; border-radius: 4px;
            cursor: pointer; font-family: var(--font-heading); transition: transform 0.2s;
            display: block; margin-left: auto; margin-bottom: 2rem;
        }
        .btn-done:hover { transform: scale(1.05); }
        .btn-done.is-done { background: #27ae60; color: white; }

        /* Comments */
        .comment-text {
            font-family: var(--font-heading); color: var(--primary-red);
            font-size: 2rem; max-width: 900px; width: 100%;
            text-align: left; margin: 0 auto; padding-left: 2rem;
        }
        .comment-section { max-width: 900px; width: 100%; margin: 0 auto; padding: 0 2rem; }

        .comment-item {
            background: var(--bg-cream); border-radius: 8px;
            padding: 1rem 1.5rem; margin-bottom: 0.8rem; color: var(--text-dark);
            font-family: var(--font-heading); position: relative;
        }
        .comment-author { font-size: 0.85rem; opacity: 0.6; margin-bottom: 0.4rem; color: var(--text-dark); }
        .comment-content { font-size: 1rem; line-height: 1.4; white-space: pre-wrap; color: var(--text-dark); }
        .comment-actions {
            position: absolute; top: 1rem; right: 1.5rem; display: flex; gap: 0.5rem;
        }
        .btn-comment-action {
            background: none; border: none; color: var(--text-dark); opacity: 0.5; cursor: pointer;
            font-size: 0.85rem; padding: 0; font-family: var(--font-heading); transition: opacity 0.2s;
        }
        .btn-comment-action:hover { opacity: 1; }

        .comment-input-area {
            display: flex; gap: 1rem; margin-top: 1.5rem;
        }
        .comment-input-area input {
            flex: 1; background: var(--bg-cream); color: var(--text-dark);
            border: none; padding: 1rem; border-radius: 20px;
            font-family: var(--font-heading); font-size: 1rem; outline: none;
        }
        .btn-send-comment {
            background: var(--bg-cream); color: var(--text-dark); border: none;
            padding: 0 1.5rem; border-radius: 20px; font-size: 1rem; cursor: pointer;
            font-family: var(--font-heading); transition: transform 0.2s;
        }
        .btn-send-comment:hover { transform: scale(1.05); }

        .comment-edit-area {
            width: 100%; background: rgba(0,0,0,0.2); color: white;
            border: 1px solid rgba(255,255,255,0.3); padding: 0.8rem; border-radius: 6px;
            font-family: var(--font-heading); font-size: 1rem; resize: none; outline: none;
            display: none; margin-top: 0.5rem;
        }
        .comment-edit-row { display: none; gap: 0.5rem; margin-top: 0.5rem; }
        .btn-save-comment { background: #27ae60; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; }
        .btn-cancel-comment { background: #c0392b; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; }

        #error-task { color: #ff6b6b; font-family: var(--font-heading); text-align: center; margin-top: 2rem; display: none; }
    </style>
</head>
<script src="../js/api.js"></script>
<body>
    <div class="corner-decoration"></div>
    <div class="auth-container">
        
        <div class="auth-card">
            <div class="task-header">
                <h2 class="task-title-display" id="task-title">Memuat...</h2>
                <div class="task-action-row">
                    <button class="btn-back" id="btn-back">Kembali</button>
                    <button class="btn-edit-task" id="btn-edit-task">✏️ Edit</button>
                </div>
            </div>

            <div class="task-meta" id="task-meta">
                <!-- Badges will be rendered here -->
            </div>

            <div class="deadline-section" id="deadline-section" style="display:none;">
                <span>📅 Deadline:</span>
                <span class="deadline-badge" id="task-deadline"></span>
            </div>

            <textarea class="textarea-wide" id="task-desc" readonly></textarea>

            <!-- Attachment Section -->
            <div class="attachment-section" id="attachment-section">
                <p style="font-family:var(--font-heading); color:white; margin-bottom:0.5rem;">📎 Lampiran:</p>
                <img id="task-attachment" class="attachment-img" alt="Attachment">
            </div>

            <button class="btn-done" id="btn-done" onclick="toggleDone()">Mark as done</button>

            <p id="error-task"></p>
        </div>

        <h2 class="comment-text">Komentar</h2>
        <div class="comment-section">
            <div id="comment-list">
                <p style="color:rgba(255,255,255,0.5);font-family:var(--font-heading);">Memuat komentar...</p>
            </div>
            <div class="comment-input-area">
                <input type="text" id="comment-input" placeholder="Tulis komentar...">
                <button class="btn-send-comment" onclick="submitComment()">Kirim</button>
            </div>
        </div>

    </div>

    <script>
        requireAuth();
        const currentUser = Auth.getUser();
        const params      = new URLSearchParams(window.location.search);
        const workspaceId = params.get('workspaceId');
        const listId      = params.get('listId');
        const taskId      = params.get('taskId');

        let currentTaskStatus = 'todo';
        let myRole = 'member'; // Default to least privilege

        if (!workspaceId || !listId || !taskId) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('btn-back').onclick = function() {
            window.location.href = `list-dashboard.html?workspaceId=${workspaceId}&listId=${listId}`;
        };

        document.getElementById('btn-edit-task').onclick = function() {
            window.location.href = `task-setting.html?workspaceId=${workspaceId}&listId=${listId}&taskId=${taskId}&mode=edit`;
        };

        async function init() {
            try {
                // Get role
                const wsRes = await WorkspaceAPI.getOne(workspaceId);
                const ws = wsRes.workspace || wsRes.data || wsRes;
                if (currentUser && ws.members) {
                    const me = ws.members.find(m => m.id === currentUser.id);
                    if (me) myRole = me.role;
                }

                if (myRole === 'owner' || myRole === 'manager') {
                    document.getElementById('btn-edit-task').style.display = 'inline-block';
                }

                await loadTask();
            } catch (err) {
                document.getElementById('error-task').textContent = 'Gagal inisialisasi: ' + (err.message || '');
                document.getElementById('error-task').style.display = 'block';
            }
        }

        async function loadTask() {
            try {
                const res = await TaskAPI.getOne(listId, taskId);
                const task = res.task || res.data || res;

                document.getElementById('task-title').textContent = task.title || 'Untitled';
                document.getElementById('task-desc').value = task.description || '';
                
                currentTaskStatus = task.status;

                if (task.due_date) {
                    const d = new Date(task.due_date);
                    if (!isNaN(d.getTime())) {
                        document.getElementById('task-deadline').textContent = d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
                        document.getElementById('deadline-section').style.display = 'flex';
                    }
                } else {
                    document.getElementById('deadline-section').style.display = 'none';
                }

                // Render Meta (Status, Priority, Assignees)
                const metaEl = document.getElementById('task-meta');
                metaEl.innerHTML = '';

                const priorityLabel = { high: 'High 🔴', medium: 'Medium', low: 'Low 🟢' };
                const statusLabel   = { todo: 'To Do', in_progress: 'In Progress', done: 'Done' };

                const pBadge = document.createElement('span');
                pBadge.className   = `meta-item priority-${task.priority || 'medium'}`;
                pBadge.textContent = priorityLabel[task.priority] || task.priority || 'Medium';
                metaEl.appendChild(pBadge);

                const sBadge = document.createElement('span');
                sBadge.className   = `meta-item ${task.status === 'done' ? 'status-done' : task.status === 'in_progress' ? 'status-progress' : ''}`;
                sBadge.textContent = statusLabel[task.status] || task.status || 'To Do';
                metaEl.appendChild(sBadge);

                if (task.assignees && task.assignees.length > 0) {
                    task.assignees.forEach(a => {
                        const aBadge = document.createElement('span');
                        aBadge.className = 'assignee-badge';
                        aBadge.textContent = a.username;
                        metaEl.appendChild(aBadge);
                    });
                }

                // Attachment
                if (task.attachment) {
                    document.getElementById('task-attachment').src = task.attachment;
                    document.getElementById('attachment-section').style.display = 'block';
                } else {
                    document.getElementById('attachment-section').style.display = 'none';
                }

                // Done button
                const btnDone = document.getElementById('btn-done');
                if (currentTaskStatus === 'done') {
                    btnDone.textContent = '✓ Selesai';
                    btnDone.classList.add('is-done');
                } else {
                    btnDone.textContent = 'Mark as done';
                    btnDone.classList.remove('is-done');
                }

                // Comments
                renderComments(task.comments || []);

            } catch (err) {
                document.getElementById('error-task').textContent = 'Gagal memuat task: ' + (err.message || 'Unknown error');
                document.getElementById('error-task').style.display = 'block';
            }
        }

        // ── Toggle done ───────────────────────────────────────────────
        async function toggleDone() {
            const newStatus = currentTaskStatus === 'done' ? 'todo' : 'done';
            try {
                await TaskAPI.update(listId, taskId, { status: newStatus });
                await loadTask();
            } catch (err) { alert('Gagal mengubah status: ' + (err.message || '')); }
        }

        // ── Render comments ───────────────────────────────────────────
        function renderComments(comments) {
            const list = document.getElementById('comment-list');
            list.innerHTML = '';

            if (comments.length === 0) {
                list.innerHTML = '<p style="color:rgba(255,255,255,0.5);font-family:var(--font-heading);">Belum ada komentar.</p>';
                return;
            }

            comments.forEach(c => {
                const commentId  = c.id;
                const isOwn      = currentUser && (c.user_id === currentUser.id || c.username === currentUser.username);
                const dateStr    = c.created_at ? new Date(c.created_at).toLocaleDateString('id-ID', {hour:'2-digit', minute:'2-digit'}) : '';

                const avatarUrl = c.profile_picture || `https://ui-avatars.com/api/?name=${encodeURIComponent(c.username || 'User')}&background=random`;

                const div = document.createElement('div');
                div.className    = 'comment-item';
                div.dataset.id   = commentId;

                div.innerHTML = `
                    <div style="display: flex; align-items: center; margin-bottom: 0.4rem; gap: 0.5rem;">
                        <img src="${avatarUrl}" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover;" alt="Avatar">
                        <div class="comment-author" style="margin-bottom: 0;">${c.username || 'User'} ${dateStr ? '· ' + dateStr : ''}</div>
                    </div>
                    <div class="comment-content" id="comment-content-${commentId}">${escapeHtml(c.content || '')}</div>
                    ${isOwn ? `
                        <div class="comment-actions">
                            <button class="btn-comment-action" onclick="startEditComment(${commentId})">✏️ Edit</button>
                            <button class="btn-comment-action" onclick="deleteComment(${commentId})">🗑</button>
                        </div>
                        <textarea class="comment-edit-area" id="comment-edit-${commentId}" rows="2">${escapeHtml(c.content || '')}</textarea>
                        <div class="comment-edit-row" id="comment-edit-row-${commentId}">
                            <button class="btn-save-comment"   onclick="saveCommentEdit(${commentId})">Simpan</button>
                            <button class="btn-cancel-comment" onclick="cancelCommentEdit(${commentId})">Batal</button>
                        </div>
                    ` : ''}
                `;
                list.appendChild(div);
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── Edit comment ──────────────────────────────────────────────
        function startEditComment(commentId) {
            document.getElementById(`comment-content-${commentId}`).style.display = 'none';
            document.getElementById(`comment-edit-${commentId}`).style.display     = 'block';
            document.getElementById(`comment-edit-row-${commentId}`).style.display = 'flex';
            const actions = document.querySelector(`[data-id="${commentId}"] .comment-actions`);
            if (actions) actions.style.display = 'none';
        }

        function cancelCommentEdit(commentId) {
            document.getElementById(`comment-content-${commentId}`).style.display = 'block';
            document.getElementById(`comment-edit-${commentId}`).style.display     = 'none';
            document.getElementById(`comment-edit-row-${commentId}`).style.display = 'none';
            const actions = document.querySelector(`[data-id="${commentId}"] .comment-actions`);
            if (actions) actions.style.display = 'flex';
        }

        async function saveCommentEdit(commentId) {
            const textarea = document.getElementById(`comment-edit-${commentId}`);
            const newContent = textarea.value.trim();
            if (!newContent) { alert('Komentar tidak boleh kosong.'); return; }

            try {
                await CommentAPI.update(listId, taskId, commentId, newContent);
                await loadTask();
            } catch (err) { alert('Gagal mengedit komentar: ' + (err.message || '')); }
        }

        async function deleteComment(commentId) {
            if (!confirm('Hapus komentar ini?')) return;
            try {
                await CommentAPI.delete(listId, taskId, commentId);
                await loadTask();
            } catch (err) { alert('Gagal menghapus komentar: ' + (err.message || '')); }
        }

        // ── Submit comment ─────────────────────────────────────────────
        async function submitComment() {
            const input   = document.getElementById('comment-input');
            const content = input.value.trim();
            if (!content) return;

            try {
                await CommentAPI.add(listId, taskId, content);
                input.value = '';
                await loadTask();
            } catch (err) { alert('Gagal mengirim komentar: ' + (err.message || '')); }
        }

        document.getElementById('comment-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitComment();
        });

        init();
    </script>
</body>
</html>
