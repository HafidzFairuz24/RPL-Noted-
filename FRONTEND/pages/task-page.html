<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noted! - Task Detail</title>
    <link rel="stylesheet" href="../css/auth.css">
    <style>
        /* Mengizinkan scroll jika konten panjang */
        body { overflow-y: auto; }
        
        .auth-container { 
            flex-direction: column; 
            justify-content: flex-start; 
            padding-top: 5vh; 
            height: auto; 
            min-height: 100vh; 
            padding-bottom: 4rem; 
        }

        .auth-card { 
            max-width: 900px; 
            text-align: left; 
            padding: 2rem; 
            position: relative; 
            margin: 2rem auto; 
            width: 100%; 
        }
        
        .task-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 1.5rem; 
            font-family: var(--font-heading); 
        }
        
        .input-task-name { 
            background: transparent; 
            border: none; 
            color: white; 
            font-family: var(--font-heading); 
            font-size: 2rem; 
            width: 70%; 
            outline: none;
        }

        .input-task-name::placeholder { color: white; opacity: 0.5; }
        
        .btn-back { 
            background: var(--bg-cream); 
            color: var(--text-dark); 
            border: none; 
            padding: 0.5rem 2rem; 
            font-size: 1.2rem; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: var(--font-heading); 
            transition: transform 0.2s; 
        }
        .btn-back:hover { transform: scale(1.05); }
        

        .textarea-wide { 
            width: 100%; 
            background: var(--bg-cream); 
            color: var(--text-dark); 
            border: none; 
            padding: 2rem; 
            border-radius: 6px; 
            font-family: var(--font-heading); 
            font-size: 1.2rem; 
            opacity: 0.6;      
            min-height: 250px; 
            margin-bottom: 1.5rem; 
            resize: none; 
            text-align: center; 
        }

        .textarea-wide::placeholder { color: var(--text-dark); opacity: 0.5; }
        
        .attachment-section { font-family: var(--font-heading); font-size: 1.2rem; margin-bottom: 1.5rem; color: white; }
        .file-box { background: var(--card-gray); color: var(--text-dark); padding: 0.5rem; width: 300px; text-align: center; margin-top: 0.5rem; border-radius: 4px; }
        
        .deadline-section { display: flex; align-items: center; gap: 1rem; font-family: var(--font-heading); font-size: 1.2rem; color: white; }
        .calendar-btn { background: var(--card-gray); color: var(--text-dark); border: none; padding: 0.5rem 1rem; border-radius: 4px; font-family: var(--font-heading); }
        
        .btn-done { 
            background: var(--bg-cream); 
            color: var(--text-dark); 
            border: none; 
            padding: 0.6rem 2rem; 
            font-size: 1rem; 
            border-radius: 4px; 
            cursor: pointer; 
            float: right; 
            margin-top: -2rem; 
            font-family: var(--font-heading); 
            transition: transform 0.2s; 
        }
        .btn-done:hover { transform: scale(1.05); }
        
        .comment-text { 
            font-family: var(--font-heading); 
            color: var(--primary-red); 
            font-size: 2rem; 
            max-width: 900px; 
            width: 100%; 
            text-align: left; 
            margin: 0 auto; 
            padding-left: 2rem;
        }
    </style>
</head>
<body>
    <div class="corner-decoration"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="task-header">
                <input type="text" class="input-task-name" placeholder="Task Name">
                <button class="btn-back" onclick="window.location.href='list-dashboard.html'">Back</button>
            </div>
            
            <textarea class="textarea-wide" placeholder="Task Description //(Max 1000 Characters)"></textarea>
            
            <div class="attachment-section">
                <p>File Attachment //(Max 2):</p>
                <div class="file-box">File 1</div>
                <div class="file-box">File 2</div>
            </div>

            <div class="deadline-section">
                <p>Deadline:</p>
                <button class="calendar-btn">Calendar</button>
            </div>

            <button class="btn-done" onclick="window.location.href='list-dashboard.html'">Mark as done</button>
        </div>
        
        <h3 class="comment-text">Comment:</h3>
    </div>
</body>
</html>
