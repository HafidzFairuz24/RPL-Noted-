<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noted! - Notification</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .top-action-bar { display: flex; justify-content: flex-end; gap: 0.8rem; margin-bottom: 1rem; }
        .btn-back-cream { background-color: var(--bg-cream); color: var(--text-dark); border: none; padding: 0.5rem 2rem; border-radius: 4px; cursor: pointer; font-family: var(--font-heading); transition: transform 0.2s; }
        .btn-back-cream:hover { transform: scale(1.05); }
        .btn-read-all { background-color: var(--sidebar-red); color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; font-family: var(--font-heading); transition: transform 0.2s; }
        .btn-read-all:hover { transform: scale(1.05); }

        .notif-container { 
            background-color: var(--sidebar-red); 
            padding: 1.5rem; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
        }

        .notif-item { 
            background-color: var(--form-bg); 
            padding: 1.5rem 2rem; 
            border-radius: 6px; 
            color: var(--text-dark); 
            font-family: var(--font-heading); 
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s ease, background-color 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .notif-item.active { 
            opacity: 1; 
            background-color: var(--bg-cream);
        }

        .notif-item.unread {
            opacity: 1;
            background-color: var(--bg-cream);
            border-left: 4px solid var(--primary-red);
        }

        .notif-item h3 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .notif-item p { font-size: 1.1rem; font-family: var(--font-body); margin: 0; }
        .notif-item .notif-info { flex: 1; }
        .notif-delete-btn { 
            background: none; 
            border: none; 
            color: var(--primary-red); 
            font-size: 1.2rem; 
            cursor: pointer; 
            padding: 0 0.5rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .notif-delete-btn:hover { opacity: 1; }
        .notif-date { font-size: 0.85rem; opacity: 0.6; margin-top: 0.3rem; }

        .page-title { color: var(--primary-red); font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 1.5rem; }
        #loading-msg { font-family: var(--font-heading); color: var(--text-dark); opacity: 0.6; text-align: center; padding: 2rem; }
        #error-notif { color: #c0392b; font-family: var(--font-heading); padding: 1rem; display: none; }
        .empty-notif { color: rgba(255,255,255,0.6); font-family: var(--font-heading); text-align: center; padding: 2rem; }
    </style>
</head>
<script src="../js/api.js"></script>
<body>
    <aside class="sidebar">
        <h1 class="logo">Noted!</h1>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-btn">Main Dashboard</a>
            <a href="profile.html" class="nav-btn">Profile</a>
            <a href="notification.html" class="nav-btn active">Notification</a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-btn" style="display: block;" onclick="Auth.logout()">Log Out</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-action-bar">
            <button class="btn-read-all" onclick="markAllRead()">Tandai Semua Dibaca</button>
            <button class="btn-back-cream" onclick="window.location.href='dashboard.html'">Back</button>
        </div>
        
        <h2 class="page-title">Notification.</h2>

        <p id="error-notif"></p>
        <p id="loading-msg">Memuat notifikasi...</p>

        <div class="notif-container" id="notif-container"></div>
    </main>

    <script>
        requireAuth();

        async function loadNotifications() {
            const container  = document.getElementById('notif-container');
            const loadingMsg = document.getElementById('loading-msg');
            const errEl      = document.getElementById('error-notif');

            try {
                const res   = await NotificationAPI.getAll();
                const notifs = Array.isArray(res) ? res : (res.notifications || res.data || []);
                loadingMsg.style.display = 'none';
                container.innerHTML = '';

                if (notifs.length === 0) {
                    container.innerHTML = '<p class="empty-notif">Tidak ada notifikasi.</p>';
                    return;
                }

                notifs.forEach(notif => {
                    const isUnread = !notif.isRead && notif.isRead !== undefined
                                     ? true
                                     : (notif.read === false);

                    const item = document.createElement('div');
                    item.className = 'notif-item' + (isUnread ? ' unread' : ' active');
                    item.dataset.id = notif._id || notif.id;

                    // Tanggal
                    let dateStr = '';
                    if (notif.createdAt) {
                        const d = new Date(notif.createdAt);
                        dateStr = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
                    }

                    item.innerHTML = `
                        <div class="notif-info">
                            <h3>${notif.title || notif.heading || 'Notifikasi'}</h3>
                            <p>${notif.message || notif.body || notif.description || ''}</p>
                            ${dateStr ? `<p class="notif-date">${dateStr}</p>` : ''}
                        </div>
                        <button class="notif-delete-btn" title="Hapus" onclick="deleteNotif('${notif._id || notif.id}', this)">✕</button>
                    `;

                    // Klik item = tandai dibaca
                    item.querySelector('.notif-info').onclick = () => markRead(notif._id || notif.id, item);

                    container.appendChild(item);
                });

            } catch (err) {
                loadingMsg.style.display = 'none';
                errEl.textContent = 'Gagal memuat notifikasi: ' + (err.message || 'Unknown error');
                errEl.style.display = 'block';
            }
        }

        async function markRead(id, el) {
            try {
                await NotificationAPI.markRead(id);
                el.classList.remove('unread');
                el.classList.add('active');
            } catch (_) { /* silent */ }
        }

        async function markAllRead() {
            try {
                await NotificationAPI.markAllRead();
                document.querySelectorAll('.notif-item.unread').forEach(el => {
                    el.classList.remove('unread');
                    el.classList.add('active');
                });
            } catch (err) {
                alert('Gagal tandai semua dibaca: ' + (err.message || ''));
            }
        }

        async function deleteNotif(id, btn) {
            if (!confirm('Hapus notifikasi ini?')) return;
            try {
                await NotificationAPI.delete(id);
                btn.closest('.notif-item').remove();
            } catch (err) {
                alert('Gagal menghapus: ' + (err.message || ''));
            }
        }

        loadNotifications();
    </script>
</body>
</html>
